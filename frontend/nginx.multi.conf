server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Real datasets exceed nginx's 1 MB default -> 413 on upload.
    client_max_body_size 50m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Multi-container compose: the API is a separate service, reachable by
        # its compose service name (`api`), not on this container's localhost.
        # (The all-in-one standalone image uses 127.0.0.1 — see nginx.conf.)
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # EDA + LLM-assisted steps can exceed nginx's 60s default, causing
        # 504s the frontend mislabels as "check file format". Match the
        # backend's worst-case budget so slow-but-valid requests complete.
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
